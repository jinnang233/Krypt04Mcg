name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check OpenSSL Version
        shell: bash
        run: |
          docker run --rm \
              alpine/openssl version
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"

      - name: Build
        run: gradle build --no-daemon

      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          find build/libs -maxdepth 1 -type f -name "*.jar" \
            ! -name "*-dev.jar" \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts

      - name: Add third-party license notices
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          BOUNCY_CASTLE_VERSION="$(sed -n 's/^bouncycastle_version=//p' gradle.properties)"
          if [ -z "$BOUNCY_CASTLE_VERSION" ]; then
            echo "Could not determine Bouncy Castle version from gradle.properties"
            exit 1
          fi

          mkdir -p legal/META-INF
          cat > release-artifacts/THIRD_PARTY_NOTICES.md <<NOTICE
          # Third-party notices

          This distribution bundles third-party dependencies inside the release JAR.

          ## Bouncy Castle

          Dependency: \`org.bouncycastle:bcprov-jdk18on:${BOUNCY_CASTLE_VERSION}\`
          Project: https://www.bouncycastle.org/
          License: MIT License / Bouncy Castle License

          MIT License (https://opensource.org/licenses/MIT)

          Copyright (c) 2000-2026 The Legion of the Bouncy Castle Inc. (https://www.bouncycastle.org).
          Permission is hereby granted, free of charge, to any person obtaining a copy of this software and
          associated documentation files (the "Software"), to deal in the Software without restriction,
          including without limitation the rights to use, copy, modify, merge, publish, distribute,
          sub license, and/or sell copies of the Software, and to permit persons to whom the Software is
          furnished to do so, subject to the following conditions: The above copyright notice and this
          permission notice shall be included in all copies or substantial portions of the Software.

          **THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR IMPLIED, INCLUDING BUT
          NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND
          NONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM,
          DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT
          OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.**

          NOTICE
          sed -i 's/^          //' release-artifacts/THIRD_PARTY_NOTICES.md
          cp release-artifacts/THIRD_PARTY_NOTICES.md legal/META-INF/THIRD-PARTY-NOTICES.md

          jars=(release-artifacts/*.jar)
          if [ ${#jars[@]} -eq 0 ]; then
            echo "No JAR files found for license notice embedding"
            exit 1
          fi

          for file in "${jars[@]}"; do
            (cd legal && jar uf "../${file}" META-INF/THIRD-PARTY-NOTICES.md)
            jar tf "$file" | grep -Fx 'META-INF/THIRD-PARTY-NOTICES.md' >/dev/null
          done

          ls -la release-artifacts

      - name: Generate snapshot tag
        id: snapshot
        shell: bash
        run: |
          echo "tag=snapshot-$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "name=Snapshot $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: VirusTotal Scan
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            release-artifacts/*.jar
      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ github.ref_type == 'tag' && github.ref_name || steps.snapshot.outputs.tag }}"
          RELEASE_NAME="${{ github.ref_type == 'tag' && github.ref_name || steps.snapshot.outputs.name }}"

          PREVIOUS_TAG="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"

          {
            echo "# ${RELEASE_NAME}"
            echo
            echo "## Changelog"
            echo

            if [ -n "$PREVIOUS_TAG" ]; then
              echo "Changes since \`${PREVIOUS_TAG}\`:"
              echo
              git log "${PREVIOUS_TAG}..HEAD" --pretty=format:'- %s (%h)' || true
            else
              echo "No previous tag was found. Recent changes:"
              echo
              git log -20 --pretty=format:'- %s (%h)' || true
            fi

            echo
            echo
            echo "## Build Artifacts"
            echo

            shopt -s nullglob
            for file in release-artifacts/*.jar; do
              sha256="$(sha256sum "$file" | awk '{print $1}')"
              filename="$(basename "$file")"

              echo "### ${filename}"
              echo
              echo "- SHA256: \`${sha256}\`"
              echo "- VirusTotal: https://www.virustotal.com/gui/file/${sha256}"
              echo
            done

            echo "## Third-party Notices"
            echo
            echo "Release JARs include bundled dependency notices at \`META-INF/THIRD-PARTY-NOTICES.md\`."
            echo "The same notice file is attached as \`THIRD_PARTY_NOTICES.md\`."
            echo
            echo "## Signature"
            echo
            echo "Each JAR file is signed with the detached \`.sign\` file."
            echo "The public key is included as \`public_key.pem\`."
          } > RELEASE_NOTE.md

          cat RELEASE_NOTE.md
      - name: Sign release artifacts
        shell: bash
        env:
          SIGN_PRIVATE_KEY: ${{ secrets.RELEASE_SIGN_KEY }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          trap 'rm -f private_key.pem; echo "Cleaned up private key."' EXIT
          umask 077
          printf '%s\n' "$SIGN_PRIVATE_KEY" >private_key.pem

          files=(release-artifacts/*.jar)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No JAR files found to sign"
            exit 1
          fi
          docker run --rm \
              -v "$PWD:/work" \
              -w /work \
              alpine/openssl pkey -pubout -in /work/private_key.pem -out /work/public_key.pem
          for file in "${files[@]}"; do
            docker run --rm \
              -v "$PWD:/work" \
              -w /work \
              alpine/openssl \
              dgst \
              -sign /work/private_key.pem \
              -out "/work/${file}.sign" \
              "/work/${file}"
          done
          rm -f private_key.pem
          ls -la release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || steps.snapshot.outputs.tag }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || steps.snapshot.outputs.name }}
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTE.md
          files: |
            release-artifacts/*.jar
            release-artifacts/*.jar.sign
            release-artifacts/THIRD_PARTY_NOTICES.md
            public_key.pem
